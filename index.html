<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #fff; text-align: left; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; max-width: 80%; word-wrap: break-word; }
        .msg.me { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.them { background: #e9ecef; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">Ready</div>

    <div id="screen-main">
        <h2>Ghost Chat</h2>
        <button class="btn-primary" onclick="showCreate()">Create Room</button>
        <button class="btn-secondary" onclick="showJoin()">Join Room</button>
    </div>

    <div id="screen-create" class="hidden">
        <h3>Your Room Code:</h3>
        <h1 id="display-code" style="color:#007bff; letter-spacing: 3px;">----</h1>
        <p style="font-size: 12px; color: gray;">Connecting to network...</p>
    </div>

    <div id="screen-join" class="hidden">
        <h3>Enter Code</h3>
        <input type="number" id="input-code" placeholder="4-digit code">
        <button class="btn-primary" onclick="startJoin()">Connect</button>
    </div>

    <div id="screen-chat" class="hidden">
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="Message...">
        <button class="btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let peer;
    let conn;
    let generatedCode;

    function switchScreen(id) {
        document.querySelectorAll('.container > div:not(#status)').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // USER A: Creates the code and waits
    function showCreate() {
        generatedCode = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('display-code').innerText = generatedCode;
        switchScreen('screen-create');
        
        document.getElementById('status').innerText = "Starting Room...";

        // Create a peer with our specific code
        peer = new Peer('ghost-room-' + generatedCode); 
        
        peer.on('open', (id) => {
            document.getElementById('status').innerText = "● Online (Waiting for friend...)";
            document.getElementById('status').style.color = "orange";
        });

        // When User B connects to us
        peer.on('connection', (connection) => {
            conn = connection;
            setupChat();
        });
    }

    function showJoin() { 
        switchScreen('screen-join'); 
    }

    // USER B: Enters the code and connects
    function startJoin() {
        const code = document.getElementById('input-code').value;
        if(!code) return alert("Enter code");

        document.getElementById('status').innerText = "Connecting...";

        // Create a random peer for the user joining
        peer = new Peer(); 
        
        peer.on('open', () => {
            // Connect to User A's specific code
            conn = peer.connect('ghost-room-' + code);
            
            conn.on('open', () => {
                setupChat();
            });
        });
    }

    // Triggered for BOTH users when successfully linked
    function setupChat() {
        switchScreen('screen-chat');
        document.getElementById('status').innerText = "● Chat Connected!";
        document.getElementById('status').style.color = "green";

        // Listen for incoming messages
        conn.on('data', (data) => {
            displayMessage(data, 'them');
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        if(input.value && conn) {
            // Send to friend
            conn.send(input.value);
            // Display on our own screen
            displayMessage(input.value, 'me');
            input.value = '';
        }
    }

    function displayMessage(text, sender) {
        const d = document.createElement('div');
        d.className = 'msg ' + sender;
        d.innerText = text;
        const chatBox = document.getElementById('chat-box');
        chatBox.appendChild(d);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }
</script>
</body>
</html>
