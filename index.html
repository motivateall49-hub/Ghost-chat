<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #fff; text-align: left; }
        .msg { background: #e3efff; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">Connecting to network...</div>

    <div id="screen-main">
        <h2>Ghost Chat</h2>
        <button class="btn-primary" onclick="showCreate()">Create Room</button>
        <button class="btn-secondary" onclick="showJoin()">Join Room</button>
    </div>

    <div id="screen-create" class="hidden">
        <h3>Room Code:</h3>
        <h1 id="display-code" style="color:#007bff">----</h1>
        <button class="btn-primary" onclick="startChat('create')">Enter Chat</button>
    </div>

    <div id="screen-join" class="hidden">
        <h3>Enter Code</h3>
        <input type="number" id="input-code" placeholder="4-digit code">
        <button class="btn-primary" onclick="startChat('join')">Connect</button>
    </div>

    <div id="screen-chat" class="hidden">
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="Message...">
        <button class="btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Use multiple relay peers in case one is down
    const peers = [
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wall.org/gun',
        'https://gun-us.herokuapp.com/gun'
    ];
    
    const gun = Gun(peers);
    let currentRoom;
    let generatedCode;

    // Status check
    gun.on('hi', () => {
        document.getElementById('status').innerText = "● Online (Connected)";
        document.getElementById('status').style.color = "green";
    });

    function showCreate() {
        generatedCode = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('display-code').innerText = generatedCode;
        switchScreen('screen-create');
    }

    function showJoin() { switchScreen('screen-join'); }

    function switchScreen(id) {
        document.querySelectorAll('.container > div:not(#status)').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startChat(mode) {
        const code = (mode === 'create') ? generatedCode : document.getElementById('input-code').value;
        if(!code) return alert("Enter code");

        currentRoom = gun.get('room-p2p-' + code);
        switchScreen('screen-chat');

        currentRoom.map().on((data) => {
            if(data && data.text) {
                const d = document.createElement('div');
                d.className = 'msg';
                d.innerText = data.text;
                document.getElementById('chat-box').appendChild(d);
            }
        });
    }

    function sendMessage() {
        const i = document.getElementById('msg-input');
        if(i.value && currentRoom) {
            currentRoom.set({ text: i.value });
            i.value = '';
        }
    }
</script>
</body>
</html>
